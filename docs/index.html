<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genotype Assembly to SNP-Chip Panel Docs</title>
  <meta
    name="description"
    content="Documentation for the genotype-assembly2snpchip workflow: setup, inputs, mapping, genotyping, gtcheck summarization, and visualization."

  <style>
    :root {
      --theme-color: #2f6f7e;

    .markdown-section {

    }

    }

<body>
  <div id="app">Loading documentation ...</div>

      homepage: "README.md",
      loadSidebar: true,
      relativePath: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        paths: "auto",
        placeholder: "Search the docs",
        noData: "No matching docs found",

    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
